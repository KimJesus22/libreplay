# Define qué carpetas son paquetes del monorepo (apps/web tendrá su propio
# package.json en F7; la API y el worker comparten el package.json raíz).
packages:
  - 'apps/web'

# pnpm bloquea los scripts pre/post-install de las dependencias por defecto
# (seguridad supply-chain). Aquí se decide caso por caso:
# - @nestjs/core: su postinstall solo imprime un mensaje de donaciones → false.
# - prisma/@prisma/*: su postinstall descarga los query engines nativos y
#   genera el cliente tipado. Sin esto, @prisma/client lanza "did you run
#   prisma generate?" en runtime → true.
# (Cuando llegue argon2 [F1], también necesita compilar → true.)
allowBuilds:
  '@nestjs/core': false
  prisma: true
  '@prisma/client': true
  '@prisma/engines': true
