# CI: lint + build + tests unitarios. Los e2e (apps/api/test) necesitan db,
# redis y minio reales — se corren a mano contra `docker compose`; meter esos
# servicios en CI es deuda para más adelante. Los unitarios del worker (F4) no
# dependen de nada externo, así que sí entran aquí.
#
# Costo $0: GitHub Actions es gratis para repos públicos (plan.md §7).
name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # pnpm/action-setup lee la versión exacta del campo "packageManager"
      # del package.json — la misma que usan Docker (corepack) y tu máquina.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # El cliente Prisma es código generado: sin este paso, cualquier import
      # de @prisma/client rompería la compilación.
      - run: pnpm prisma:generate

      - run: pnpm lint

      - run: pnpm build

      - run: pnpm test:unit
