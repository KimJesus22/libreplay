# Entorno de desarrollo completo (criterio §6.5: "docker compose up" levanta todo).
# Cada servicio mapea 1:1 con la tabla de plan.md §6.

services:
  # PostgreSQL con la extensión pgvector ya compilada — una sola BD para
  # datos relacionales Y vectores de búsqueda semántica (decisión plan.md §2).
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: libreplay
      POSTGRES_PASSWORD: libreplay # solo dev; en prod va en .env del VPS
      POSTGRES_DB: libreplay
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U libreplay']
      interval: 5s
      timeout: 3s
      retries: 5

  # Redis cumple doble función: backend de colas BullMQ (pipeline IA) y caché.
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  # MinIO = sustituto local de Cloudflare R2. Habla el mismo protocolo S3,
  # así que el código de la API no distingue entre dev y prod: solo cambia
  # la URL y las credenciales por variables de entorno.
  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: libreplay
      MINIO_ROOT_PASSWORD: libreplay123 # solo dev
    ports:
      - '9000:9000' # API S3
      - '9001:9001' # consola web (http://localhost:9001)
    volumes:
      - minio-data:/data

  # La API corre dentro de Docker con el código montado como volumen:
  # editas un .ts en tu editor y nest --watch recompila dentro del contenedor.
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    # Antes de arrancar, aplica las migraciones pendientes (migrate deploy es
    # la variante no-interactiva, segura para arranques automáticos). Así
    # "docker compose up" deja la BD lista sin pasos manuales (criterio §6.5).
    command: sh -c "pnpm prisma migrate deploy && pnpm run start:api"
    ports:
      - '3000:3000'
    environment:
      PORT: 3000
      # Dentro de la red de compose los hosts son los nombres de servicio
      # (db, redis, minio), no localhost — localhost solo aplica desde tu
      # máquina.
      DATABASE_URL: postgresql://libreplay:libreplay@db:5432/libreplay
      REDIS_URL: redis://redis:6379
      # Secreto de juguete SOLO para compose dev; en prod va en el .env del
      # VPS. validateEnv() lo exige al arrancar desde F1.
      JWT_SECRET: dev-compose-secret-no-prod
      # La API opera MinIO por la red interna, pero las URLs prefirmadas las
      # consume el host/navegador: van firmadas con localhost (la firma S3
      # incluye el host — ver config/env.ts).
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: http://localhost:9000
      S3_ACCESS_KEY: libreplay
      S3_SECRET_KEY: libreplay123
      S3_BUCKET: videos
      # Ollama para la búsqueda semántica (F5): la API embebe la QUERY con bge-m3.
      OLLAMA_URL: http://ollama:11434
    volumes:
      - .:/app
      # Truco importante: este volumen anónimo "tapa" node_modules del host.
      # Sin él, los binarios npm de Windows pisarían a los de Linux del
      # contenedor y nada arrancaría.
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
      # service_started (no _healthy): la API arranca sin esperar el pull de
      # modelos (~4 GB). Solo la búsqueda semántica necesita Ollama listo; el
      # resto de la API funciona igual.
      ollama:
        condition: service_started

  # Contenedor de transcripción (F4): faster-whisper tras una API HTTP. El
  # worker le manda el audio extraído y recibe el texto. Es el servicio más
  # pesado del compose (carga un modelo en RAM) — por eso vive aislado.
  whisper:
    build:
      context: ./infra/whisper
      dockerfile: Dockerfile
    environment:
      # Modelo `small` por defecto (plan.md §2); cambiable sin tocar el código.
      WHISPER_MODEL: small
    ports:
      - '8081:8081'
    volumes:
      # Cachea los modelos descargados entre reinicios: la primera vez baja
      # `small` del Hub (~460 MB); sin el volumen lo re-bajaría en cada arranque.
      - whisper-cache:/root/.cache/huggingface
    healthcheck:
      # El worker no debe mandar audio antes de que el modelo esté cargado.
      test: ['CMD-SHELL', 'python -c "import urllib.request; urllib.request.urlopen(\"http://localhost:8081/health\")"']
      interval: 10s
      timeout: 5s
      retries: 10
      # start_period generoso: cargar el modelo la primera vez tarda.
      start_period: 120s

  # Worker BullMQ (F4): consume la cola `transcribe`. Proceso Node aparte de la
  # API (plan.md §1) — si satura CPU transcribiendo, la API sigue sirviendo video.
  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    environment:
      DATABASE_URL: postgresql://libreplay:libreplay@db:5432/libreplay
      REDIS_URL: redis://redis:6379
      # Mismo storage que la API: el worker BAJA el MP4 para extraer el audio.
      # No necesita S3_PUBLIC_ENDPOINT (no firma URLs para el navegador).
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: libreplay
      S3_SECRET_KEY: libreplay123
      S3_BUCKET: videos
      # whisper por la red interna de compose.
      WHISPER_URL: http://whisper:8081
      # Ollama: el worker genera metadata (LLM) y embeddings (bge-m3).
      OLLAMA_URL: http://ollama:11434
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      whisper:
        condition: service_healthy
      # _healthy: el worker SÍ espera a que los modelos estén bajados — sin
      # ellos, metadata y embed fallarían en el primer job.
      ollama:
        condition: service_healthy

  # Ollama (F5): metadata (qwen2.5:3b-instruct) + embeddings (bge-m3). Modelos
  # locales, sin API key — costo $0 (plan.md §2/§7). El entrypoint los baja al
  # primer arranque y quedan en el volumen. Es, con whisper, el servicio pesado.
  ollama:
    build:
      context: ./infra/ollama
      dockerfile: Dockerfile
    ports:
      - '11434:11434'
    volumes:
      # Cachea modelos (~4 GB) entre reinicios; sin esto, re-pull en cada arranque.
      - ollama-data:/root/.ollama
    healthcheck:
      # Sano solo cuando AMBOS modelos están presentes: gatea al worker hasta
      # que el pipeline IA tenga con qué trabajar.
      test:
        - CMD-SHELL
        - 'ollama list | grep -q bge-m3 && ollama list | grep -q qwen2.5'
      interval: 15s
      timeout: 10s
      retries: 20
      # start_period largo: el pull inicial de ~4 GB tarda según la red.
      start_period: 600s

volumes:
  postgres-data:
  minio-data:
  whisper-cache:
  ollama-data:
